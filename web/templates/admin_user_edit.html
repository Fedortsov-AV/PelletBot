{% extends "base.html" %}
{% block content %}
<h1>Редактировать пользователя</h1>
<div class="card" style="max-width:500px;">
    <form method="post">
        <div class="form-group">
            <label>Telegram ID</label>
            <input type="number" name="telegram_id" value="{{ edited_user.telegram_id }}" required>
        </div>
        <div class="form-group">
            <label>Полное имя</label>
            <input type="text" name="full_name" value="{{ edited_user.full_name }}" required>
        </div>
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" value="{{ edited_user.username }}" required>
        </div>
        <div class="form-group">
            <label>Новый пароль (оставьте пустым, чтобы не менять)</label>
            <input type="password" name="password">
        </div>
        <div class="form-group">
            <label>Роль</label>
            <select name="role">
                {% for r in roles %}
                <option value="{{ r }}" {% if r == edited_user.role %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/admin/users" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
