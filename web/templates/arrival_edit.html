{% extends "base.html" %}
{% block content %}
<h1>Редактировать приход №{{ arrival.id }}</h1>
<div class="card" style="max-width: 500px;">
    <form method="post" action="/arrivals/{{ arrival.id }}/edit">
        <div class="form-group">
            <label>Сырьё</label>
            <input type="text" value="{{ arrival.raw_product.name if arrival.raw_product else '—' }}" disabled>
        </div>
        <div class="form-group">
            <label for="amount">Количество (кг)</label>
            <input type="number" id="amount" name="amount" value="{{ arrival.amount }}" min="1" required>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/arrivals" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
