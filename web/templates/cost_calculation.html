{% extends "base.html" %}
{% block content %}
<h1>Расчёт себестоимости</h1>
<div class="card" style="max-width:500px;">
    <form method="post" action="/cost-calculation">
        <div class="form-group">
            <label for="period_start">Начало периода</label>
            <input type="date" id="period_start" name="period_start" required>
        </div>
        <div class="form-group">
            <label for="period_end">Конец периода</label>
            <input type="date" id="period_end" name="period_end" required>
        </div>
        {% if request.query_params.error == 'no_production' %}
        <div class="error-msg">За этот период нет выпуска продукции.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Рассчитать</button>
        <a href="/dashboard" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
