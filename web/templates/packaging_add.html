{% extends "base.html" %}
{% block content %}
<h1>Добавить фасовку</h1>
<div class="card" style="max-width: 500px;">
    <form method="post" action="/packaging/add" id="packagingForm">
        <div class="form-group">
            <label for="raw_product_id">Сырьё</label>
            <select id="raw_product_id" name="raw_product_id" required onchange="loadProducts(this.value)">
                <option value="">— Выберите —</option>
                {% for rp, amt in raw_materials %}
                <option value="{{ rp.id }}">{{ rp.name }} (доступно {{ amt }} кг)</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="product_id">Продукт</label>
            <select id="product_id" name="product_id" required disabled>
                <option value="">— Сначала выберите сырьё —</option>
            </select>
        </div>
        <div class="form-group">
            <label for="amount">Количество пачек</label>
            <input type="number" id="amount" name="amount" min="1" required>
            <small id="maxPacksInfo"></small>
        </div>

        <!-- Блок материалов -->
        <h3>Использованные материалы</h3>
        <p><em>Наклейки списываются автоматически (1 на пачку).</em></p>
        <div id="materialsContainer">
            <!-- Первая строка пустая для добавления -->
            <div class="item-row">
                <select name="material_id" class="material-select" style="flex: 2;">
                    <option value="">— Не выбран —</option>
                    {% for mat in materials %}
                    <option value="{{ mat.id }}">{{ mat.name }}</option>
                    {% endfor %}
                </select>
                <input type="number" name="material_quantity" placeholder="Кол-во" min="0.01" step="any" class="material-qty" style="flex: 1;">
                <div class="material-extra" style="display:none;">
                    <input type="number" placeholder="м/пачку" step="0.01" class="material-per-pack" style="width:80px;">
                </div>
            </div>
        </div>
        <button type="button" onclick="addMaterialRow()" class="btn btn-secondary">+ Добавить материал</button>

        {% if request.query_params.error == 'insufficient_raw' %}
        <div class="error-msg">Недостаточно сырья на складе!</div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/packaging" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script>
const amountInput = document.getElementById('amount');

// Загрузка продуктов при выборе сырья
async function loadProducts(rawId) {
    const productSelect = document.getElementById('product_id');
    const maxInfo = document.getElementById('maxPacksInfo');
    productSelect.disabled = true;
    productSelect.innerHTML = '<option value="">— Загрузка... —</option>';
    if (!rawId) {
        productSelect.innerHTML = '<option value="">— Сначала выберите сырьё —</option>';
        return;
    }
    try {
        const resp = await fetch(`/api/products-for-raw/${rawId}`);
        const products = await resp.json();
        productSelect.innerHTML = '<option value="">— Выберите продукт —</option>';
        products.forEach(p => {
            const option = document.createElement('option');
            option.value = p.id;
            option.textContent = `${p.name} (вес ${p.weight} кг, на складе ${p.stock} шт)`;
            option.dataset.weight = p.weight;
            option.dataset.stock = p.stock;
            productSelect.appendChild(option);
        });
        productSelect.disabled = false;
    } catch (e) {
        productSelect.innerHTML = '<option value="">— Ошибка загрузки —</option>';
    }
}

// Обновление максимального количества пачек
amountInput.addEventListener('input', function() {
    const productSelect = document.getElementById('product_id');
    const selectedOption = productSelect.options[productSelect.selectedIndex];
    if (selectedOption && selectedOption.dataset.weight) {
        const weight = parseFloat(selectedOption.dataset.weight);
        const stock = parseFloat(selectedOption.dataset.stock);
        const amount = parseInt(this.value, 10);
        if (!isNaN(amount) && amount > 0) {
            const maxPacks = Math.floor(stock / weight);
            document.getElementById('maxPacksInfo').textContent = `Максимально можно расфасовать: ${maxPacks} пачек`;
        } else {
            document.getElementById('maxPacksInfo').textContent = '';
        }
    }
    // Автообновление количества для материалов типа "пакет"
    updateAutomaticQuantities();
});

// Функция обновления количества в строках, где материал – пакет или рукав
function updateAutomaticQuantities() {
    const amount = parseInt(amountInput.value, 10);
    if (isNaN(amount) || amount <= 0) return;
    document.querySelectorAll('.item-row').forEach(row => {
        const select = row.querySelector('.material-select');
        const qtyInput = row.querySelector('.material-qty');
        const extraDiv = row.querySelector('.material-extra');
        const perPackInput = row.querySelector('.material-per-pack');
        if (!select || !qtyInput) return;
        const selectedText = select.options[select.selectedIndex]?.textContent.toLowerCase() || '';
        if (selectedText.includes('пакет')) {
            qtyInput.value = amount;
        } else if (selectedText.includes('рукав')) {
            if (extraDiv) extraDiv.style.display = 'inline';
            if (perPackInput && perPackInput.value) {
                qtyInput.value = (amount * parseFloat(perPackInput.value)).toFixed(2);
            }
        } else {
            if (extraDiv) extraDiv.style.display = 'none';
        }
    });
}

// Обработчик изменения выбора материала в любой строке
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('material-select')) {
        updateAutomaticQuantities();
    }
});

// Обработчик изменения расхода рукава
document.addEventListener('input', function(e) {
    if (e.target.classList.contains('material-per-pack')) {
        updateAutomaticQuantities();
    }
});

// Добавление новой строки материала
function addMaterialRow() {
    const container = document.getElementById('materialsContainer');
    const template = container.querySelector('.item-row').cloneNode(true);
    template.querySelector('.material-select').selectedIndex = 0;
    template.querySelector('.material-qty').value = '';
    const extraDiv = template.querySelector('.material-extra');
    if (extraDiv) extraDiv.style.display = 'none';
    const perPackInput = template.querySelector('.material-per-pack');
    if (perPackInput) perPackInput.value = '';
    container.appendChild(template);
}
</script>
{% endblock %}
